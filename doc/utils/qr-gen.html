
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-Armband Generator - Stadtranderholung Selm </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <style>
        /* General styles for the screen */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="url"], input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        input[type="url"]:focus, input[type="number"]:focus, input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select {
            cursor: pointer;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #6c757d;
            margin-top: 15px;
        }

        .error {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .hidden {
            display: none !important;
        }

        /* Styles for the print page */
        .print-page {
            display: none;
            background: white;
            padding: 0;
            width: 800px;
        }

        .print-page.active {
            display: block;
        }

        .print-controls {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .qr-strip {
            width: 250mm;
            height: 25mm;
            border: 2px dashed #ddd;
            display: flex;
            align-items: center;
            margin-bottom: 4mm;
            position: relative;
            background: white;
            padding-left: 25mm; /* margin-left = height of the strip */
            gap: 5mm;
            box-sizing: border-box;
        }

        .qr-strip.blue {
            background-color: #2196F3;
        }

        .qr-strip.orange {
            background-color: #FF9800;
        }

        .qr-strip.green {
            background-color: #4CAF50;
        }

        .qr-code {
            width: 20mm;
            height: 20mm;
            background: white;
            padding: 0;
            border-radius: 0px;
            flex-shrink: 0;
        }

        .qr-pattern {
            height: var(--pattern-height, 20mm);
            width: auto;
            flex-shrink: 0;
            display: block;
        }

        .qr-text {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        /* Print styles */
        @media print {
            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            .container {
                display: none !important;
            }

            .print-controls {
                display: none !important;
            }

            .print-page {
                display: block !important;
                background: white !important;
                padding: 2mm 0 !important;
                margin: 0 !important;
                width: 250mm !important;
            }

            .qr-strip {
                width: 250mm !important;
                height: 25mm !important;

                border: 1px solid #000 !important;

                page-break-inside: avoid;
                display: flex !important;
                align-items: center !important;
                margin-bottom: 4mm !important;
                position: relative !important;
                background: white !important;
                padding-left: 25mm !important; /* margin-left = height of the strip */
                gap: 5mm !important;
                box-sizing: border-box !important;
            }

            .qr-strip.blue {
                background-color: #2196F3 !important;
            }

            .qr-strip.orange {
                background-color: #FF9800 !important;
            }

            .qr-strip.green {
                background-color: #4CAF50 !important;
            }

            .qr-code {
                width: 20mm !important;
                height: 20mm !important;
                background: white !important;
                padding: 0 !important;
                border-radius: 0 !important;
                flex-shrink: 0 !important;
            }

            .qr-text {
                font-size: 12pt !important;
                color: white !important;
                font-weight: bold !important;
                text-shadow: 1px 1px 1px rgba(0,0,0,0.8) !important;
                white-space: nowrap !important;
            }

            .qr-pattern {
                height: var(--pattern-height, 20mm) !important;
                width: auto !important;
                flex-shrink: 0 !important;
                display: block !important;
            }
        }

        @media screen and (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 30px 20px;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="inputForm">
        <h1>🏷️ QR-Armband Generator</h1>
        <form id="qrForm">
            <div class="form-group">
                <label for="baseUrl">Basis-URL:</label>
                <input type="url" id="baseUrl" value="https://sre-nrw.de" required>
                <div class="error" id="urlError">Bitte geben Sie eine gültige URL ein</div>
            </div>

            <div class="form-group">
                <label for="paramName">Parametername:</label>
                <input type="text" id="paramName" value="id" required>
            </div>

            <div class="form-group">
                <label for="colorSelect">Farbe:</label>
                <select id="colorSelect" required>
                    <option value="green">Grün</option>
                    <option value="blue">Blau</option>
                    <option value="orange">Orange</option>
                </select>
            </div>

            <div class="form-group">
                <label for="stripText">Text (nach den QR-Codes):</label>
                <input type="text" id="stripText" value="Stadtranderholung Selm 2026" required>
            </div>

            <div class="form-group">
                <label for="patternScale">Größe des Musters: <span id="patternScaleValue">100</span>%</label>
                <input type="range" id="patternScale" min="0" max="100" value="100">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="minId">Min ID:</label>
                    <input type="number" id="minId" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label for="maxId">Max ID:</label>
                    <input type="number" id="maxId" min="1" value="100" required>
                </div>
            </div>

            <div class="form-group">
                <label for="errorLevel">QR-Code Fehlerkorrektur:</label>
                <select id="errorLevel" required>
                    <option value="L">L - 7% Schäden</option>
                    <option value="M" selected>M - 15% Schäden</option>
                    <option value="Q">Q - 25% Schäden</option>
                    <option value="H">H - 30% Schäden</option>
                </select>
            </div>

            <div class="error" id="rangeError">Min ID muss kleiner oder gleich Max ID sein</div>
            
            <button type="submit" class="btn">
                ✨ QR-Codes generieren
            </button>
        </form>
    </div>

    <div class="print-page" id="printPage">
        <div class="print-controls">
            <h2>QR-Armbänder bereit zum Drucken!</h2>
            <p>Drucken Sie diese Seite im A4-Format und schneiden Sie entlang der Linien</p>
            <button class="btn" onclick="window.print()">🖨️ Drucken</button>
            <button class="btn btn-secondary" onclick="goBack()">← Zurück zum Formular</button>
        </div>
        <div id="qrContainer"></div>
    </div>

        // DOM elements
        const form = document.getElementById('qrForm');
        const inputForm = document.getElementById('inputForm');
        const printPage = document.getElementById('printPage');
        const qrContainer = document.getElementById('qrContainer');
        const baseUrlInput = document.getElementById('baseUrl');
        const paramNameInput = document.getElementById('paramName');
        const colorSelect = document.getElementById('colorSelect');
        const stripTextInput = document.getElementById('stripText');
        const patternScaleInput = document.getElementById('patternScale');
        const patternScaleValue = document.getElementById('patternScaleValue');
        const minIdInput = document.getElementById('minId');
        const maxIdInput = document.getElementById('maxId');
        const errorLevelSelect = document.getElementById('errorLevel');
        const urlError = document.getElementById('urlError');
        const rangeError = document.getElementById('rangeError');

        // Form submission handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validate data
            if (validateInputs()) {
                generateQRCodes();
            }
        });

        /**
         * Validates input data
         * @returns {boolean} true if data is valid
         */
        function validateInputs() {
            let isValid = true;
            
            // Hide previous errors
            urlError.style.display = 'none';
            rangeError.style.display = 'none';
            
            // URL check
            const baseUrl = baseUrlInput.value.trim();
            try {
                new URL(baseUrl);
            } catch {
                urlError.style.display = 'block';
                isValid = false;
            }
            
            // ID range check
            const minId = parseInt(minIdInput.value);
            const maxId = parseInt(maxIdInput.value);
            if (!minId || !maxId || minId > maxId) {
                rangeError.style.display = 'block';
                isValid = false;
            }
            
            return isValid;
        }

        /**
         * Generates QR codes and creates the print page
         */
        function generateQRCodes() {
            const baseUrl = baseUrlInput.value.trim();
            const paramName = paramNameInput.value.trim() || 'id';
            const color = colorSelect.value;
            const stripText = stripTextInput.value.trim();
            const patternScale = parseInt(patternScaleInput.value) / 100;
            const minId = parseInt(minIdInput.value);
            const maxId = parseInt(maxIdInput.value);
            const errorLevel = errorLevelSelect.value;
            
            // Clear the container
            qrContainer.innerHTML = '';
            
            // Generate QR codes
            for (let i = minId; i <= maxId; i++) {
                createQRStrip(baseUrl, paramName, i, color, stripText, patternScale, errorLevel);
            }
            
            // Switch to print page
            showPrintPage();
        }

        /**
         * Creates a single QR code strip:
         * [margin-left = height] [QR] [5mm] [pattern, scaled] [5mm] [QR] [5mm] [text]
         * @param {string} baseUrl - base URL
         * @param {string} paramName - name of the query parameter (default 'id')
         * @param {number} id - ID for the QR code
         * @param {string} color - strip background color
         * @param {string} stripText - text placed after the QR codes
         * @param {number} patternScale - scale factor for the pattern image, 0..1 (1 = 100% = 20mm height)
         * @param {string} errorLevel - error correction level
         */
        function createQRStrip(baseUrl, paramName, id, color, stripText, patternScale, errorLevel) {
            // Form the full URL, e.g. https://sre-nrw.de/?id=100
            const fullUrl = `${baseUrl}${baseUrl.includes('?') ? '&' : '?'}${paramName}=${id}`;
            
            // Create the strip container
            const strip = document.createElement('div');
            strip.className = `qr-strip ${color}`;

            const canvasLeft = document.createElement('canvas');
            canvasLeft.className = 'qr-code';

            const pattern = document.createElement('img');
            pattern.className = 'qr-pattern';
            pattern.src = PATTERN_IMAGE_SRC;
            pattern.alt = 'узор';
            // 100% = fits as originally (20mm height), scales down to 0
            const patternHeightMm = 20 * patternScale;
            pattern.style.setProperty('--pattern-height', patternHeightMm + 'mm');
            pattern.style.width = 'auto';

            const canvasRight = document.createElement('canvas');
            canvasRight.className = 'qr-code';

            const text = document.createElement('div');
            text.className = 'qr-text';
            text.textContent = stripText;
            
            // Generate both QR codes (same value on both ends of the band)
            try {
                new QRious({ element: canvasLeft, value: fullUrl, size: 200, level: errorLevel });
                new QRious({ element: canvasRight, value: fullUrl, size: 200, level: errorLevel });
            } catch (error) {
                console.error('QR code generation error:', error);
            }
            
            // Assemble elements: QR - pattern - QR - text
            strip.appendChild(canvasLeft);
            strip.appendChild(pattern);
            strip.appendChild(canvasRight);
            strip.appendChild(text);
            qrContainer.appendChild(strip);
        }

        /**
         * Show the print page
         */
        function showPrintPage() {
            inputForm.style.display = 'none';
            printPage.classList.add('active');
            document.body.style.background = 'white';
            document.body.style.padding = '0';
        }

        /**
         * Return to the input form
         */
        function goBack() {
            printPage.classList.remove('active');
            inputForm.style.display = 'flex';
            document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            document.body.style.padding = '20px';
        }

        // Autofocus on the first field on load
        window.addEventListener('load', function() {
            baseUrlInput.focus();
        });

        // Live update of the pattern scale percentage label
        patternScaleInput.addEventListener('input', function() {
            patternScaleValue.textContent = this.value;
        });

        // Update max ID when min ID changes
        minIdInput.addEventListener('input', function() {
            const minValue = parseInt(this.value);
            if (minValue && parseInt(maxIdInput.value) < minValue) {
                maxIdInput.value = minValue;
            }
        });

        // Update min ID when max ID changes
        maxIdInput.addEventListener('input', function() {
            const maxValue = parseInt(this.value);
            if (maxValue && parseInt(minIdInput.value) > maxValue) {
                minIdInput.value = maxValue;
            }
        });
    </script>
